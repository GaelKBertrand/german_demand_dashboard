<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GATI · Sector Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/dashboard.css" />
</head>
<body>
  <header class="db-head">
    <div class="wrap db-head__row">
      <div class="db-head__left">
        <a class="db-back" href="index.html" aria-label="Back to all dashboards">&larr;</a>
        <div>
          <p class="eyebrow" id="db-eyebrow">Germany · Skills-Mobility</p>
          <h1 class="db-title" id="db-title">Sector dashboard</h1>
        </div>
      </div>
      <div class="db-head__meta" id="db-meta"><!-- date range / total injected --></div>
    </div>
  </header>

  <div class="wrap">
    <!-- Filters -->
    <section class="filters card" aria-label="Filters">
      <div class="filter">
        <label for="flt-state">State</label>
        <select id="flt-state"><option value="ALL">All states</option></select>
      </div>
      <div class="filter">
        <label for="flt-isic">Employer sector</label>
        <select id="flt-isic"><option value="ALL">All employers</option></select>
      </div>
      <label class="filter filter--check" for="flt-genuine">
        <input type="checkbox" id="flt-genuine" />
        <span>Hide duplicate reposts</span>
      </label>
      <div class="filter-count mono" id="filter-count">—</div>
    </section>

    <!-- KPIs -->
    <section class="kpis" id="kpis" aria-label="Headline figures"><!-- injected --></section>

    <!-- Tabs -->
    <nav class="tabs" id="tab-nav" role="tablist">
      <button class="tab-btn is-active" role="tab" onclick="showTab('overview', this)">Overview</button>
      <button class="tab-btn" role="tab" onclick="showTab('roles', this)">Occupations</button>
      <button class="tab-btn" role="tab" onclick="showTab('regional', this)">Regional</button>
      <button class="tab-btn" role="tab" onclick="showTab('explorer', this)">Explorer</button>
    </nav>

    <!-- Panels -->
    <section id="tab-overview" class="tab-panel is-active">
      <div class="grid-2">
        <div class="card panel"><h3 class="panel__h">Top occupations</h3><div id="chart-top" class="plot"></div></div>
        <div class="card panel"><h3 class="panel__h">Postings by employer sector</h3><div id="chart-isic" class="plot"></div></div>
      </div>
      <div class="card panel"><h3 class="panel__h">Postings over time</h3><div id="chart-trend" class="plot plot--wide"></div></div>
    </section>

    <section id="tab-roles" class="tab-panel">
      <div class="card panel">
        <h3 class="panel__h">Occupation groups (ISCO-3)</h3>
        <div class="table-scroll"><table class="ledger" id="role-table"></table></div>
      </div>
    </section>

    <section id="tab-regional" class="tab-panel">
      <div class="grid-2 grid-2--map">
        <div class="card panel"><h3 class="panel__h">Postings by state</h3><div id="map" class="map"></div></div>
        <div class="card panel"><h3 class="panel__h">State breakdown</h3><div class="table-scroll"><table class="ledger" id="state-table"></table></div></div>
      </div>
    </section>

    <section id="tab-explorer" class="tab-panel">
      <div class="card panel">
        <div class="explorer__bar">
          <h3 class="panel__h" style="margin:0">Postings</h3>
          <input type="search" id="exp-search" placeholder="Search title, employer, occupation…" />
        </div>
        <div class="table-scroll"><table class="ledger" id="exp-table"></table></div>
        <div class="explorer__more"><button class="btn btn--ghost" id="exp-more">Show more</button></div>
      </div>
    </section>

    <!-- Load / error states -->
    <div id="db-status" class="db-status" hidden></div>
  </div>

  <footer class="db-foot"><div class="wrap muted">GATI · Skills-Mobility Data · source StepStone.de, classified to ISCO-08.</div></footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="assets/js/sectors.js"></script>
  <script src="assets/js/data-loader.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
